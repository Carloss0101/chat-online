<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Chat Online</title>

    <link rel="stylesheet" href="../../css/auth.css">
</head>
<body>

<div class="auth-container">

    <div class="auth-card">

        <h1>Bem-vindo!</h1>

        <form id="loginForm">

            <div class="input-group">
                <label>E-mail</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Digite seu e-mail"
                    required>
            </div>

            <div class="input-group">
                <label>Senha</label>
                <input
                    type="password"
                    id="senha"
                    placeholder="Digite sua senha"
                    required>
            </div>

            <button type="submit">
                Entrar
            </button>
            <p id="mensagem-resposta"></p>
        </form>

        <div class="auth-link">
            Não possui uma conta?
            <a href="./cadastro">Criar conta</a>
        </div>

    </div>

</div>

<script type="module" src="../../js/auth/login.js"></script>

</body>
</html>
